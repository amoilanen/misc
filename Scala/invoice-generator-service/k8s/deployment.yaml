apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoice-generator-service
  namespace: default
  labels:
    app: invoice-generator-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: invoice-generator-service
  template:
    metadata:
      labels:
        app: invoice-generator-service
    spec:
      containers:
        - name: invoice-generator-service
          image: invoice-generator-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: invoice-generator-config
          env:
            - name: APP_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: invoice-generator-secrets
                  key: APP_DATABASE_URL
            - name: APP_DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: invoice-generator-secrets
                  key: APP_DATABASE_USERNAME
            - name: APP_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: invoice-generator-secrets
                  key: APP_DATABASE_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: invoice-generator-service
  namespace: default
spec:
  selector:
    app: invoice-generator-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
