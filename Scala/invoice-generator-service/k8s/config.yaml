apiVersion: v1
kind: ConfigMap
metadata:
  name: invoice-generator-config
  namespace: default
data:
  APP_SERVER_HOST: "0.0.0.0"
  APP_SERVER_PORT: "8080"
  APP_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  APP_KAFKA_TOPIC: "invoice-events"
  APP_KAFKA_GROUP_ID: "invoice-generator-service"
  APP_KAFKA_AUTO_OFFSET_RESET: "earliest"
  APP_GCP_PROJECT_ID: "my-gcp-project"
  APP_GCP_BUCKET_NAME: "invoice-pdfs"
  APP_TELEMETRY_ENABLED: "false"
  APP_TELEMETRY_ENDPOINT: "http://jaeger:4317"
  APP_TELEMETRY_SERVICE_NAME: "invoice-generator-service"
---
apiVersion: v1
kind: Secret
metadata:
  name: invoice-generator-secrets
  namespace: default
type: Opaque
stringData:
  APP_DATABASE_URL: "jdbc:postgresql://postgres:5432/invoice_generator"
  APP_DATABASE_USERNAME: "postgres"
  APP_DATABASE_PASSWORD: "CHANGEME"
