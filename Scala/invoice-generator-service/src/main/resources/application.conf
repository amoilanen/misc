app {
  database {
    url = "jdbc:postgresql://localhost:5432/invoice_generator"
    url = ${?APP_DATABASE_URL}
    username = "postgres"
    username = ${?APP_DATABASE_USERNAME}
    password = "password"
    password = ${?APP_DATABASE_PASSWORD}
    driver = "org.postgresql.Driver"
    driver = ${?APP_DATABASE_DRIVER}
    max-connections = 10
    max-connections = ${?APP_DATABASE_MAX_CONNECTIONS}
  }

  kafka {
    bootstrap-servers = "localhost:9092"
    bootstrap-servers = ${?APP_KAFKA_BOOTSTRAP_SERVERS}
    topic = "invoice-events"
    topic = ${?APP_KAFKA_TOPIC}
    group-id = "invoice-generator-service"
    group-id = ${?APP_KAFKA_GROUP_ID}
    auto-offset-reset = "earliest"
    auto-offset-reset = ${?APP_KAFKA_AUTO_OFFSET_RESET}
  }

  gcp {
    project-id = "fake-project-id"
    project-id = ${?APP_GCP_PROJECT_ID}
    bucket-name = "invoice-pdfs"
    bucket-name = ${?APP_GCP_BUCKET_NAME}
    credentials-path = null
    credentials-path = ${?APP_GCP_CREDENTIALS_PATH}
    # For local development with fake-gcs-server
    endpoint = "http://localhost:4443"
    endpoint = ${?APP_GCP_ENDPOINT}
  }

  server {
    host = "0.0.0.0"
    host = ${?APP_SERVER_HOST}
    port = 8080
    port = ${?APP_SERVER_PORT}
  }

  telemetry {
    enabled = false
    enabled = ${?APP_TELEMETRY_ENABLED}
    endpoint = "http://localhost:4317"
    endpoint = ${?APP_TELEMETRY_ENDPOINT}
    service-name = "invoice-generator-service"
    service-name = ${?APP_TELEMETRY_SERVICE_NAME}
  }
}
